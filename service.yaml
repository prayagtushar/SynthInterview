apiVersion: serving.knative.dev/v1
kind: Service
metadata:
  name: synth-interview-api
  annotations:
    run.googleapis.com/ingress: all
spec:
  template:
    spec:
      containerConcurrency: 80
      timeoutSeconds: 3600
      containers:
        - image: asia-south1-docker.pkg.dev/YOUR_PROJECT_ID/synth-interview/api:latest
          ports:
            - containerPort: 8000
          resources:
            limits:
              cpu: '1'
              memory: 1Gi
          env:
            - name: GEMINI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: GEMINI_API_KEY
                  key: latest
            - name: FIREBASE_SERVICE_ACCOUNT_JSON
              valueFrom:
                secretKeyRef:
                  name: FIREBASE_SERVICE_ACCOUNT_JSON
                  key: latest
            - name: GCS_BUCKET_NAME
              valueFrom:
                secretKeyRef:
                  name: GCS_BUCKET_NAME
                  key: latest
            - name: RECRUITER_EMAIL
              valueFrom:
                secretKeyRef:
                  name: RECRUITER_EMAIL
                  key: latest
            - name: SMTP_HOST
              valueFrom:
                secretKeyRef:
                  name: SMTP_HOST
                  key: latest
            - name: SMTP_PORT
              valueFrom:
                secretKeyRef:
                  name: SMTP_PORT
                  key: latest
            - name: SMTP_USER
              valueFrom:
                secretKeyRef:
                  name: SMTP_USER
                  key: latest
            - name: SMTP_PASS
              valueFrom:
                secretKeyRef:
                  name: SMTP_PASS
                  key: latest
            - name: EMAIL_FROM
              valueFrom:
                secretKeyRef:
                  name: EMAIL_FROM
                  key: latest
            - name: APP_URL
              value: https://synthinterview.xyz
            - name: GEMINI_LIVE_MODEL
              value: gemini-2.5-flash-native-audio-preview-12-2025
            - name: GEMINI_TEXT_MODEL
              value: gemini-2.5-flash
            - name: ALLOWED_ORIGINS
              value: https://synthinterview.xyz,https://www.synthinterview.xyz

# 1. Frontend server block
server {
    listen 80;
    server_name synth.prayagtushar.xyz;

    # Redirect HTTP to HTTPS once SSL is set up via certbot
    # return 301 https://$host$request_uri;

    location / {
        proxy_pass http://localhost:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

# 2. Backend API server block
server {
    listen 80;
    server_name api.synth.prayagtushar.xyz;

    # Allow larger payloads for vision/frame uploads if necessary
    client_max_body_size 50M;

    # Standard REST API endpoints (/sessions, /questions, etc.)
    location / {
        proxy_pass http://localhost:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # WebSocket connections for Gemini Live and signaling
    location /ws/ {
        proxy_pass http://localhost:8000/ws/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "Upgrade";
        proxy_set_header Host $host;
        
        # Increase timeouts for long-running real-time interviews
        proxy_read_timeout 3600;
        proxy_send_timeout 3600;
    }
}

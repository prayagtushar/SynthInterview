# GCP Cloud Build — builds and deploys both services to Cloud Run
#
# Prerequisites (run once):
#   gcloud artifacts repositories create synth-interview \
#     --repository-format=docker --location=${_REGION}
#
#   # Create secrets in Secret Manager:
#   gcloud secrets create GEMINI_API_KEY --data-file=-
#   gcloud secrets create FIREBASE_SERVICE_ACCOUNT_JSON --data-file=-
#   gcloud secrets create ELEVENLABS_API_KEY --data-file=-
#   gcloud secrets create REDIS_URL --data-file=-
#   gcloud secrets create SMTP_PASS --data-file=-
#
# Set these substitution variables in your Cloud Build trigger:
#   _REGION, _AR_REPO, _API_SERVICE, _WEB_SERVICE
#   _NEXT_PUBLIC_API_URL        (e.g. https://synth-interview-api-xyz-uc.a.run.app)
#   _NEXT_PUBLIC_FIREBASE_API_KEY
#   _NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN
#   _NEXT_PUBLIC_FIREBASE_PROJECT_ID
#   _NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET
#   _NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID
#   _NEXT_PUBLIC_FIREBASE_APP_ID

substitutions:
  _REGION: asia-south1
  _AR_REPO: synth-interview
  _API_SERVICE: synth-interview-api
  _WEB_SERVICE: synth-interview-web
  # GCP project: synth-interview-8e83a
  _NEXT_PUBLIC_API_URL: ""
  _APP_URL: ""
  _GEMINI_LIVE_MODEL: "gemini-2.5-flash-native-audio-preview-12-2025"
  _GEMINI_TEXT_MODEL: "gemini-2.5-flash"
  _NEXT_PUBLIC_FIREBASE_API_KEY: ""
  _NEXT_PUBLIC_FIREBASE_PROJECT_ID: ""
  _NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN: ""
  _NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET: ""
  _NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID: ""
  _NEXT_PUBLIC_FIREBASE_APP_ID: ""
  _NEXT_PUBLIC_ADMIN_EMAIL: ""
  _NEXT_PUBLIC_DEMO_CODE: ""

steps:
  # Build API and Web images in parallel
  - id: build-api
    name: gcr.io/cloud-builders/docker
    args:
      - build
      - -t
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_AR_REPO}/api:latest
      - -f
      - apps/api/Dockerfile
      - .
    waitFor: ["-"]

  - id: build-web
    name: gcr.io/cloud-builders/docker
    args:
      - build
      - -t
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_AR_REPO}/web:latest
      - -f
      - apps/web/Dockerfile
      - --build-arg
      - NEXT_PUBLIC_API_URL=${_NEXT_PUBLIC_API_URL}
      - --build-arg
      - NEXT_PUBLIC_FIREBASE_API_KEY=${_NEXT_PUBLIC_FIREBASE_API_KEY}
      - --build-arg
      - NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN=${_NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN}
      - --build-arg
      - NEXT_PUBLIC_FIREBASE_PROJECT_ID=${_NEXT_PUBLIC_FIREBASE_PROJECT_ID}
      - --build-arg
      - NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET=${_NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET}
      - --build-arg
      - NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID=${_NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID}
      - --build-arg
      - NEXT_PUBLIC_FIREBASE_APP_ID=${_NEXT_PUBLIC_FIREBASE_APP_ID}
      - --build-arg
      - NEXT_PUBLIC_ADMIN_EMAIL=${_NEXT_PUBLIC_ADMIN_EMAIL}
      - --build-arg
      - NEXT_PUBLIC_DEMO_CODE=${_NEXT_PUBLIC_DEMO_CODE}
      - .
    waitFor: ["-"]

  # Push images in parallel
  - id: push-api
    name: gcr.io/cloud-builders/docker
    args:
      [
        push,
        --all-tags,
        "${_REGION}-docker.pkg.dev/$PROJECT_ID/${_AR_REPO}/api",
      ]
    waitFor: [build-api]

  - id: push-web
    name: gcr.io/cloud-builders/docker
    args:
      [
        push,
        --all-tags,
        "${_REGION}-docker.pkg.dev/$PROJECT_ID/${_AR_REPO}/web",
      ]
    waitFor: [build-web]

  # Deploy API to Cloud Run
  - id: deploy-api
    name: gcr.io/google.com/cloudsdktool/cloud-sdk:slim
    entrypoint: gcloud
    args:
      - run
      - deploy
      - ${_API_SERVICE}
      - --image=${_REGION}-docker.pkg.dev/$PROJECT_ID/${_AR_REPO}/api:latest
      - --region=${_REGION}
      - --platform=managed
      - --allow-unauthenticated
      - --ingress=all
      - --port=8000
      - --min-instances=0
      - --max-instances=10
      - --memory=1Gi
      - --cpu=1
      - --timeout=3600
      - --set-env-vars=APP_ENV=production,APP_URL=${_APP_URL},GEMINI_LIVE_MODEL=${_GEMINI_LIVE_MODEL},GEMINI_TEXT_MODEL=${_GEMINI_TEXT_MODEL},ALLOWED_ORIGINS=${_APP_URL}
      - --update-secrets=GEMINI_API_KEY=GEMINI_API_KEY:latest,FIREBASE_PROJECT_ID=FIREBASE_PROJECT_ID:latest,GCS_BUCKET_NAME=GCS_BUCKET_NAME:latest,FIREBASE_SERVICE_ACCOUNT_JSON=FIREBASE_SERVICE_ACCOUNT_JSON:latest,SMTP_HOST=SMTP_HOST:latest,SMTP_PORT=SMTP_PORT:latest,SMTP_USER=SMTP_USER:latest,SMTP_PASS=SMTP_PASS:latest,EMAIL_FROM=EMAIL_FROM:latest
    waitFor: [push-api]

  # Deploy Web to Cloud Run
  - id: deploy-web
    name: gcr.io/google.com/cloudsdktool/cloud-sdk:slim
    entrypoint: gcloud
    args:
      - run
      - deploy
      - ${_WEB_SERVICE}
      - --image=${_REGION}-docker.pkg.dev/$PROJECT_ID/${_AR_REPO}/web:latest
      - --region=${_REGION}
      - --platform=managed
      - --allow-unauthenticated
      - --port=3000
      - --min-instances=0
      - --max-instances=5
      - --memory=512Mi
      - --cpu=1
      - --set-env-vars=NODE_ENV=production
    waitFor: [deploy-api]

images:
  - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_AR_REPO}/api:latest
  - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_AR_REPO}/web:latest

options:
  logging: CLOUD_LOGGING_ONLY
  machineType: E2_HIGHCPU_8

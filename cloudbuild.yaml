# GCP Cloud Build — builds and deploys to Cloud Run
#
# Prerequisite: Create secrets in Secret Manager for sensitive values:
#   GEMINI_API_KEY, FIREBASE_SERVICE_ACCOUNT_JSON, GCS_BUCKET_NAME, SMTP_PASS, RECRUITER_EMAIL, etc.

substitutions:
  _REGION: asia-south1
  _AR_REPO: synth-interview
  _API_SERVICE: synth-interview-api
  _WEB_SERVICE: synth-interview-web
  _APP_URL: ''
  _GEMINI_LIVE_MODEL: 'gemini-2.5-flash-native-audio-preview-12-2025'
  _GEMINI_TEXT_MODEL: 'gemini-2.5-flash'
  _NEXT_PUBLIC_API_URL: ''
  _NEXT_PUBLIC_FIREBASE_API_KEY: ''
  _NEXT_PUBLIC_FIREBASE_PROJECT_ID: ''
  _NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN: ''
  _NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET: ''
  _NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID: ''
  _NEXT_PUBLIC_FIREBASE_APP_ID: ''
  _NEXT_PUBLIC_ADMIN_EMAIL: ''
  _NEXT_PUBLIC_DEMO_CODE: 'SYNTH2025'

steps:
  # 1. Build & Push API
  - id: build-push-api
    name: gcr.io/kaniko-project/executor:latest
    args:
      - --dockerfile=apps/api/Dockerfile
      - --context=dir:///workspace
      - --destination=${_REGION}-docker.pkg.dev/$PROJECT_ID/${_AR_REPO}/api:latest
      - --cache=true

  # 2. Build & Push Web
  - id: build-push-web
    name: gcr.io/kaniko-project/executor:latest
    args:
      - --dockerfile=apps/web/Dockerfile
      - --context=dir:///workspace
      - --destination=${_REGION}-docker.pkg.dev/$PROJECT_ID/${_AR_REPO}/web:latest
      - --cache=true
      - --build-arg=NEXT_PUBLIC_API_URL=${_NEXT_PUBLIC_API_URL}
      - --build-arg=NEXT_PUBLIC_FIREBASE_API_KEY=${_NEXT_PUBLIC_FIREBASE_API_KEY}
      - --build-arg=NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN=${_NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN}
      - --build-arg=NEXT_PUBLIC_FIREBASE_PROJECT_ID=${_NEXT_PUBLIC_FIREBASE_PROJECT_ID}
      - --build-arg=NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET=${_NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET}
      - --build-arg=NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID=${_NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID}
      - --build-arg=NEXT_PUBLIC_FIREBASE_APP_ID=${_NEXT_PUBLIC_FIREBASE_APP_ID}
      - --build-arg=NEXT_PUBLIC_ADMIN_EMAIL=${_NEXT_PUBLIC_ADMIN_EMAIL}
      - --build-arg=NEXT_PUBLIC_DEMO_CODE=${_NEXT_PUBLIC_DEMO_CODE}

  # 3. Deploy API
  - id: deploy-api
    name: gcr.io/google.com/cloudsdktool/cloud-sdk:slim
    entrypoint: gcloud
    args:
      - run
      - deploy
      - ${_API_SERVICE}
      - --image=${_REGION}-docker.pkg.dev/$PROJECT_ID/${_AR_REPO}/api:latest
      - --region=${_REGION}
      - --platform=managed
      - --allow-unauthenticated
      - --port=8000
      - --memory=1Gi
      - --cpu=1
      - --timeout=3600
      - --set-env-vars=APP_URL=${_APP_URL},GEMINI_LIVE_MODEL=${_GEMINI_LIVE_MODEL},GEMINI_TEXT_MODEL=${_GEMINI_TEXT_MODEL},ALLOWED_ORIGINS=${_APP_URL}
      - --update-secrets=GEMINI_API_KEY=GEMINI_API_KEY:latest,FIREBASE_SERVICE_ACCOUNT_JSON=FIREBASE_SERVICE_ACCOUNT_JSON:latest,GCS_BUCKET_NAME=GCS_BUCKET_NAME:latest,RECRUITER_EMAIL=RECRUITER_EMAIL:latest,SMTP_HOST=SMTP_HOST:latest,SMTP_PORT=SMTP_PORT:latest,SMTP_USER=SMTP_USER:latest,SMTP_PASS=SMTP_PASS:latest,EMAIL_FROM=EMAIL_FROM:latest

  # 4. Deploy Web
  - id: deploy-web
    name: gcr.io/google.com/cloudsdktool/cloud-sdk:slim
    entrypoint: gcloud
    args:
      - run
      - deploy
      - ${_WEB_SERVICE}
      - --image=${_REGION}-docker.pkg.dev/$PROJECT_ID/${_AR_REPO}/web:latest
      - --region=${_REGION}
      - --platform=managed
      - --allow-unauthenticated
      - --port=3000
      - --memory=512Mi
      - --cpu=1

options:
  logging: CLOUD_LOGGING_ONLY
  machineType: E2_HIGHCPU_8
